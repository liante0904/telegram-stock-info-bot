services:
  telegram-bot:
    image: ghcr.io/liante0904/telegram-stock-info-bot:latest
    container_name: stock-telegram-bot-${APP_ENV:-prod}
    restart: always
    user: "1001:1001"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - TZ=Asia/Seoul
      - MPLCONFIGDIR=/tmp/matplotlib
      - APP_SECRETS_ROOT=/secrets
      - APP_SECRETS_WORKSPACE=telegram-stock-info-bot
      - APP_SECRETS_FILE=secrets.json
    volumes:
      - ./cache:/app/cache
      - ./db:/app/db
      - ./excel:/app/excel
      - ./chart:/app/chart
      - ./csv:/app/csv
      - ./json:/app/json
      - ./send:/app/send
      - /home/ubuntu/secrets:/secrets:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  reporter-worker:
    # 만약 로컬 빌드를 원하면 build: ./reporter_worker 로 변경 가능
    image: ghcr.io/liante0904/telegram-stock-info-bot-worker:latest
    container_name: stock-reporter-worker-${APP_ENV:-prod}
    user: "1001:1001"
    restart: always
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - TZ=Asia/Seoul
      - MPLCONFIGDIR=/tmp/matplotlib
      - APP_SECRETS_ROOT=/secrets
      - APP_SECRETS_WORKSPACE=telegram-stock-info-bot
      - APP_SECRETS_FILE=secrets.json
    volumes:
      - ./cache:/app/cache
      - ./send:/app/send
      - /home/ubuntu/secrets:/secrets:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
